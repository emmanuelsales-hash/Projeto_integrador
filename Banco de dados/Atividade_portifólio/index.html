        .texto-centro {
    text-align: center; /* A mágica acontece aqui */
    font-family: Arial, sans-serif;
    margin-top: 50px;
  }
        /*colocando uma animação*/
        @keyframes surgir {
            from{
                opacity: 0;
                transform: translatey(45px); /*serve para que a animação começe uma determinada quantidade de px abaixo*/
            }
            to{
                opacity: 1;
                transform: translatey(0px) /*serve para que a animação volte para o local original*/
            }
        }

        .titulo-animado {
        font-family: Arial, sans-serif;
        font-size: 3.75rem;
        color: #26c0e7;
        text-align: center;
        margin-top: 50px;

        animation: surgir 2.5s ease-out forwards;
        

        }
        .container-links {
    display: flex;
    justify-content: center; /* Centraliza a fileira na tela */
    gap: 30px;               /* Distância entre um link e outro */
    margin-top: 40px;
}

/* Ajuste para o link não ocupar a largura toda da tela */
.link-estilizado {
    text-decoration: none;
    display: inline-block;
}
       
    </style>
    <style> /*--isso muda a cor de fundo do site */
    body {

    .link-efeito {

            display: inline-block;

            color: #fff;
            background-color: #6200ee;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: sans-serif;
            font-weight: bold;

            /* A "mágica" para o efeito ser suave */
            transition: transform 0.3s ease, box-shadow 0.3s ease, filter 0.3s ease;
        }

        /* O efeito acontece aqui */
        .link-efeito:hover {
            transform: scale(1.1); /* Fica maior */
            filter: brightness(1.3); /* Fica mais iluminado */
            box-shadow: 0 0 20px rgba(98, 0, 238, 0.6); /* Brilho em volta */
        }
    </style>

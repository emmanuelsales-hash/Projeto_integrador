<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>elementos de tabela.</h2>
    <p>Os elementos de tabela em html são usados para organizar 
        dados em linhas e colunas , como uma planilha.</p>
        <table border="i">
        <caption>tabela de produtos</caption>
        <thead>
            <tr>
                <th>produtos</th>
                <th>preço</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Teclado</td>
                <td>R$ 80,00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>R$ 80,00</td>
            </tr>
        </tfoot>
    </table>
    <!--table define uma tabela -->
    <!--tr define uma linha-->
    <!--th define uma célula de cabeçalho-->
    <!--td define uma célula comum-->
    <!--thead-->
</body>
</html>
